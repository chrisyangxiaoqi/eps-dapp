name: Task Orchestrator
on:
  issue_comment:
    types: [created]

jobs:
  chain-next-task:
    # Trigger when Claude Code posts a completion signal
    if: |
      contains(github.event.comment.body, 'ALL TASKS COMPLETE') == false &&
      (contains(github.event.comment.body, 'TASK COMPLETE') ||
       contains(github.event.comment.body, 'T101 DONE') ||
       contains(github.event.comment.body, 'T102 DONE') ||
       contains(github.event.comment.body, 'T103 DONE') ||
       contains(github.event.comment.body, 'T104 DONE') ||
       contains(github.event.comment.body, 'T105 DONE') ||
       contains(github.event.comment.body, 'T106 DONE') ||
       contains(github.event.comment.body, 'T107 DONE'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Open next task issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CLAUDE_PAT }}
          script: |
            const comment = context.payload.comment.body;
            const issueNum = context.payload.issue.number;

            // Determine which task just completed
            const taskMap = {
              'T101 DONE': { next: 'T102', file: 'tasks/T102-unit-tests.md' },
              'T102 DONE': { next: 'T103', file: 'tasks/T103-api-integration.md' },
              'T103 DONE': { next: 'T104', file: 'tasks/T104-e2e-playwright.md' },
              'T104 DONE': { next: 'T105', file: 'tasks/T105-stripe.md' },
              'T105 DONE': { next: 'T106', file: 'tasks/T106-worker-delivery.md' },
              'T106 DONE': { next: 'T107', file: 'tasks/T107-production-hardening.md' },
              'T107 DONE': { next: 'T108', file: 'tasks/T108-ethglobal-submission.md' },
            };

            let nextTask = null;
            for (const [signal, task] of Object.entries(taskMap)) {
              if (comment.includes(signal) || comment.includes('TASK COMPLETE')) {
                nextTask = task;
                break;
              }
            }

            if (!nextTask) {
              console.log('No next task to chain. Done.');
              return;
            }

            // Read task file from repo
            const fs = require('fs');
            let taskContent = '';
            try {
              taskContent = fs.readFileSync(nextTask.file, 'utf8');
            } catch(e) {
              taskContent = 'See tasks directory for full spec.';
            }

            // Close the current issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
              state: 'closed'
            });

            // Open next task issue
            const newIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: nextTask.next + ': Auto-chained from completed task',
              labels: ['claude-code', 'task', 'auto-chained'],
              body: '@claude\n\n' + taskContent + '\n\n---\n_Auto-chained by Task Orchestrator from issue #' + issueNum + '_'
            });

            console.log('Opened next task issue: ' + newIssue.data.number);
