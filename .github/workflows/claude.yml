name: Claude Code
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.CLAUDE_PAT }}
      - name: Configure git
        run: |
          git config --global user.email "claude-code@eps-dapp.ai"
          git config --global user.name "Claude Code"
          git remote set-url origin https://x-access-token:${{ secrets.CLAUDE_PAT }}@github.com/${{ github.repository }}.git
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.CLAUDE_PAT }}
          settings: '{"permissions":{"allow":["Write","Edit","Bash(*)","Read"],"deny":[]}}'
          show_full_output: "true"
          claude_args: "--max-turns 200 --dangerously-skip-permissions"
